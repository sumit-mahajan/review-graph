[alembic]
script_location = src/infrastructure/db/migrations
prepend_sys_path = .
# Overridden at runtime from DATABASE_URL in env.py (repo root .env or shell env).
sqlalchemy.url = postgresql+asyncpg://localhost/pr_reviewer

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
